<html>
  <head>
    <title>Roll</title>
    <script src="jquery-1.3.2.min.js"> </script>
    <script src="jquery.backgroundPosition.js"> </script>
    <script src="jquery.color.js"> </script>
    <script src="jquery.pulse.js"> </script>
    <script src="./xlsx.full.min.js"></script>
    <link href="roll.css" media="screen" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Rokkitt" rel="stylesheet">
  </head>
  <body>
    <div id='configtime'>
      <p class="file">List NV:<input type="file" id="file"></p>
      <p class="file">List Giải thưởng:<input type="file" id="file2"></p>
    </div>
    <div id="header">
      <h1 style="font-family: Rokkitt, sans-serif; text-align: center; padding-top:100px; color: #F5DB79; font-size: 4vw;">
        QUAY TRÚNG THƯỞNG
      </h1>
      </div>
      <div id="prize_title" style="font-family: Rokkitt, sans-serif; text-align: center; color: #F5DB79; font-size: 3vw; max-width: 70%; width: fit-content; margin-left: auto; margin-right: auto;">
        Giải: 
      </div>
    <div id='showtime' style="display: block;position: absolute;width: 100%;height: 50%;margin: 0 auto">
      <div id='numbers2' style="position: relative; height: 100px;margin: 0 auto;display: table;background:#F5DB79;padding: 2px;border-radius:5px;top:50px;">
        <div id='numbers' style="position: relative; height: 100px;margin: 0 auto;display: table;background:#f7b93c;padding-right: 10px;border-radius:5px">
        <!-- <div id='numbers' style="width: 100%;font-family: AvenirCondensed;font-size: 5em;text-align:center;margin: 0 auto;display:table;"> -->
          <div class="num" id="num0" onclick="stop(0)">
          </div>
          <div class="num" id="num1" onclick="stop(1)">
          </div>
          <div class="num" id="num2" onclick="stop(2)">
          </div>
          <div class="num" id="num3" onclick="stop(3)">
          </div>
         <div class="clear"> </div>
        </div>
      </div>

      <div id='numbers3' class="report_parent">
          <div id="report" class="report">
        </div>
      </div>

    </div>

      <div class="bottom_div">
        <p>
          <input type="button" class="btn" value="Clear" onclick="reset()"/>
        </p>
        <p>
          <input type="button" class="btn" value="Dừng nhanh" onclick="stop(7)"/>
        </p>
        <p>
          <input type="button" class="btn" value="Quay" onclick="spinprize()"/>
        </p>
        <p>
          <input type="button" class="btn" value="Xuất DS" onclick="exportwinners()"/>
        </p>
      </div>
      <br/>

      <p class="debuginfo">
      <input type="button" value="Roll" onclick="doit()"/>
      </p>

      <div class='debuginfo'>
        <input type="button" value="Choose a new random number" onclick="choosenew()"/>
        </p>
      </div>

      <p class="selecthide">
      <!-- Number chosen:  --><span id="rand"> </span>
      </p>
    </div>

    <script src="roll.js">
    </script>
  </body>
</html>
