<html>
  <head>
    <title>Quay Số Trúng Thưởng</title>
    <script src="./lib/jquery-1.3.2.min.js"> </script>
    <script src="./lib/jquery.backgroundPosition.js"> </script>
    <script src="./lib/jquery.color.js"> </script>
    <script src="./lib/jquery.pulse.js"> </script>
    <script src="./lib/jquery-ui-1.14.2/jquery-ui.js"> </script>
    <script src="./lib/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="./asset/roll.css" media="screen" rel="stylesheet" type="text/css" />
    <link rel="icon" type="image/png" href="./asset/lottery-game.png">
  </head>
  <body>
  <div id="side_notch">&#9664;</div>
  <div id="side_panel">
  <div id="panel_tabs">
    <div class="panel_tab active" data-tab="winners">
      Winners <span class="tab_badge" id="badge_winners">0</span>
    </div>
    <div class="panel_tab" data-tab="prizes">
      Prizes <span class="tab_badge" id="badge_prizes">0</span>
    </div>
  </div>

  <div class="panel_content active" id="tab_winners">
    <div id="name_input_box">
    <textarea id="name_input" placeholder="Nhập tên, Enter để xuống dòng..."></textarea>
    </div>
    <table id="winners_table">
      <thead>
        <tr>
<!--      <th>ID</th> -->
          <th>Tên</th>
          <th>Giải</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="winners_footer">
      Total: <span id="total_employees">0</span> &nbsp;|&nbsp; Eligible: <span id="total_eligible">0</span>
      &nbsp;|&nbsp; <button id="repick_toggle" onclick="toggleRepick()">Repick: OFF</button>
    </div>
  </div>

  <div class="panel_content" id="tab_prizes">
    <table id="prizes_table">
      <thead>
        <tr>
          <th style="width:30px"></th>
          <th>Tên Giải</th>
          <th>Số lượng</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

    <div id="main_layout">
  <div id="sidebar_left" class="sidebar"></div>

  <div id="main_content">
    <div id="header">
      <h1>QUAY SỐ TRÚNG THƯỞNG</h1>
    </div>
    <div id="prize_title">
      Giải __________
    </div>
    <div id='showtime'>
      <div id='numbers2'>
        <div id='numbers'>
          <div class="num" id="num0" onclick="stop(0)"></div>
          <div class="num" id="num1" onclick="stop(1)"></div>
          <div class="num" id="num2" onclick="stop(2)"></div>
          <div class="num" id="num3" onclick="stop(3)"></div>
        </div>
      </div>
      <div id='numbers3' class="report_parent">
        <div id="report" class="report"></div>
      </div>
    </div>
  </div>

  <div id="sidebar_right" class="sidebar"></div>
</div>
      <div class="bottom_div">
        <p>
          <input type="button" class="btn" value="Dừng nhanh" onclick="quickStop()"/>
        </p>
        <p>
          <input type="button" class="btn" value="Quay" onclick="spinPrize()"/>
        </p>
        <p>
          <input type="button" class="btn" value="Xuất DS" onclick="exportWinners()"/>
        </p>
      </div>
      <div id='configtime'>
        <p class="file">1. Import danh sách NV<input type="file" id="file"></p>
        <p class="file">2. Import danh sách Giải<input type="file" id="file2"></p>
        <p><button onclick="downloadTemplatesEmployee()">Tải bản mẫu danh sách NV</button></p>
        <p><button onclick="downloadTemplatesPrize()">Tải bản mẫu danh sách Giải</button></p>
      </div>
      <br/>

      <p class="debuginfo">
      <input type="button" value="Roll" onclick="doIt()"/>
      </p>
    </div>
  <script src="./lib/global.js"></script>
  <script src="./lib/animation.js"></script>
  <script src="./lib/confetti.js"></script>
  <script src="./lib/prizes.js"></script>
  <script src="./lib/data.js"></script>
  <script src="./lib/winners.js"></script>
  <script src="./lib/panel.js"></script>
  <script src="./lib/ui.js"></script>
  <script src="./lib/roll.js"></script>
  </body>
</html>
